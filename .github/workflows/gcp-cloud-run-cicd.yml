name: GCP LangGraph Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: gcp-langgraph
  ARTIFACT_REPOSITORY: gcp-langgraph
  IMAGE_NAME: gcp-langgraph-api
  OPENAI_EMBEDDING_MODEL: text-embedding-3-small
  OPENAI_EMBEDDING_DIMENSIONS: "1024"
  OPENAI_GENERATION_MODEL: gpt-4.1-mini
  AUTOGEN_MODEL: gpt-4.1-mini
  AUTOGEN_TEMPERATURE: "0"
  LANGGRAPH_MODEL: gpt-4.1-mini
  LANGGRAPH_OUTPUT_BUCKET: ""
  PINECONE_HOST: https://news-demo-4fe9eo0.svc.aped-4627-b74a.pinecone.io
  PINECONE_INDEX: news-demo
  PINECONE_NAMESPACE: news
  MEMORY_NAMESPACE: memory

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "${ARTIFACT_REPOSITORY}" --location="${REGION}" || \
          gcloud artifacts repositories create "${ARTIFACT_REPOSITORY}" \
            --repository-format=docker \
            --location="${REGION}" \
            --description="GCP LangGraph real-time endpoint containers"

      - name: Build container
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Push container
        run: docker push "${IMAGE_URI}"

      - name: Deploy real-time endpoint to Cloud Run
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE_URI}" \
            --region="${REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --min-instances=1 \
            --max-instances=3 \
            --set-env-vars="APP_NAME=${SERVICE_NAME},GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL},OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS},OPENAI_GENERATION_MODEL=${OPENAI_GENERATION_MODEL},AUTOGEN_MODEL=${AUTOGEN_MODEL},AUTOGEN_TEMPERATURE=${AUTOGEN_TEMPERATURE},LANGGRAPH_MODEL=${LANGGRAPH_MODEL},LANGGRAPH_OUTPUT_BUCKET=${LANGGRAPH_OUTPUT_BUCKET},PINECONE_HOST=${PINECONE_HOST},PINECONE_INDEX=${PINECONE_INDEX},PINECONE_NAMESPACE=${PINECONE_NAMESPACE},MEMORY_NAMESPACE=${MEMORY_NAMESPACE},PINECONE_HYBRID_ENABLED=false,PINECONE_HYBRID_ALPHA=0.5,RAG_MAX_CONTEXT_CHARS=12000" \
            --set-secrets="OPENAI_API_KEY=OPENAI_API_KEY:latest,PINECONE_API_KEY=PINECONE_API_KEY:latest"

      - name: Print endpoint URL
        run: |
          SERVICE_URL="$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" --format='value(status.url)')"
          echo "Real-time endpoint: ${SERVICE_URL}"
          echo "Health check: ${SERVICE_URL}/health"
