version: 0.2

env:
  shell: bash

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - set -euo pipefail
      - apt-get update
      - apt-get install -y apt-transport-https ca-certificates curl gnupg
      - curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
      - echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" > /etc/apt/sources.list.d/google-cloud-sdk.list
      - apt-get update
      - apt-get install -y google-cloud-cli
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt
  pre_build:
    commands:
      - set -euo pipefail
      - python -m pytest -q
      - printf '%s' "$GCP_SERVICE_ACCOUNT_KEY_JSON" > /tmp/gcp-key.json
      - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
      - gcloud config set project "$GCP_PROJECT_ID"
      - gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet
      - |
        gcloud artifacts repositories describe "$ARTIFACT_REPOSITORY" \
          --location="$GCP_REGION" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "$ARTIFACT_REPOSITORY" \
          --repository-format=docker \
          --location="$GCP_REGION" \
          --description="Vertex MCP Ops containers"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-manual}"
      - IMAGE_TAG="${IMAGE_TAG:0:12}"
      - IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${IMAGE_TAG}"
  build:
    commands:
      - set -euo pipefail
      - docker build -t "$IMAGE_URI" .
      - docker push "$IMAGE_URI"
  post_build:
    commands:
      - set -euo pipefail
      - |
        MODEL_RESOURCE=$(gcloud ai models upload \
          --region="$GCP_REGION" \
          --display-name="${VERTEX_MODEL_NAME}-${IMAGE_TAG}" \
          --container-image-uri="$IMAGE_URI" \
          --container-ports=8080 \
          --container-health-route=/health \
          --container-predict-route=/predict \
          --container-env-vars=APP_NAME="$IMAGE_NAME",GCP_PROJECT_ID="$GCP_PROJECT_ID",OPENAI_API_KEY="$OPENAI_API_KEY",OPENAI_EMBEDDING_MODEL="$OPENAI_EMBEDDING_MODEL",OPENAI_EMBEDDING_DIMENSIONS="$OPENAI_EMBEDDING_DIMENSIONS",OPENAI_GENERATION_MODEL="$OPENAI_GENERATION_MODEL",PINECONE_API_KEY="$PINECONE_API_KEY",PINECONE_HOST="$PINECONE_HOST",PINECONE_INDEX="$PINECONE_INDEX",PINECONE_NAMESPACE="$PINECONE_NAMESPACE",MEMORY_NAMESPACE="$MEMORY_NAMESPACE" \
          --format="value(model)")
        MODEL_ID="${MODEL_RESOURCE##*/}"
        if [[ -z "$MODEL_ID" ]]; then
          echo "Vertex model upload did not return a model resource."
          exit 1
        fi
        ENDPOINT_RESOURCE=$(gcloud ai endpoints list \
          --region="$GCP_REGION" \
          --filter="display_name=${VERTEX_ENDPOINT_NAME}" \
          --format="value(name)" | head -n 1)
        if [[ -z "$ENDPOINT_RESOURCE" ]]; then
          ENDPOINT_RESOURCE=$(gcloud ai endpoints create \
            --region="$GCP_REGION" \
            --display-name="$VERTEX_ENDPOINT_NAME" \
            --format="value(name)")
        fi
        ENDPOINT_ID="${ENDPOINT_RESOURCE##*/}"
        gcloud ai endpoints deploy-model "$ENDPOINT_ID" \
          --region="$GCP_REGION" \
          --model="$MODEL_ID" \
          --display-name="${VERTEX_MODEL_NAME}-deployed-${IMAGE_TAG}" \
          --machine-type=n1-standard-2 \
          --min-replica-count=1 \
          --max-replica-count=1 \
          --traffic-split=0=100
        printf 'IMAGE_URI=%s\nMODEL_ID=%s\nENDPOINT_ID=%s\n' "$IMAGE_URI" "$MODEL_ID" "$ENDPOINT_ID" | tee vertex-deployment.env

artifacts:
  files:
    - vertex-deployment.env
