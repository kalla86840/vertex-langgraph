AWSTemplateFormatVersion: "2010-09-09"
Description: AWS CodePipeline CI/CD for deploying this container to a real-time GCP Vertex AI endpoint.

Parameters:
  PipelineName:
    Type: String
    Default: aws-langgraph-pipeline
  CodeStarConnectionArn:
    Type: String
    Description: ARN of an AWS CodeStar connection authorized for GitHub.
  GitHubFullRepositoryId:
    Type: String
    Default: kalla86840/vertex-mcp-ops
    Description: GitHub repository in owner/repo format.
  GitHubBranch:
    Type: String
    Default: main
  GcpProjectId:
    Type: String
    Description: GCP project that owns Artifact Registry and Vertex AI.
  GcpRegion:
    Type: String
    Default: us-central1
  ArtifactRegistryRepository:
    Type: String
    Default: vertex-pinecone
  ImageName:
    Type: String
    Default: vertex-pinecone-mcp
  VertexEndpointName:
    Type: String
    Default: aws-langgraph-endpoint
  VertexModelName:
    Type: String
    Default: vertex-pinecone-mcp-model
  PineconeHost:
    Type: String
    Default: https://news-demo-4fe9eo0.svc.aped-4627-b74a.pinecone.io
  PineconeIndex:
    Type: String
    Default: news-demo
  PineconeNamespace:
    Type: String
    Default: news
  MemoryNamespace:
    Type: String
    Default: memory
  OpenAIEmbeddingModel:
    Type: String
    Default: text-embedding-3-small
  OpenAIEmbeddingDimensions:
    Type: String
    Default: "1024"
  OpenAIGenerationModel:
    Type: String
    Default: gpt-4.1-mini
  GcpServiceAccountKeyParameterName:
    Type: String
    Default: /vertex-mcp-ops/gcp-service-account-key-json
    Description: SecureString SSM parameter containing the full GCP service account JSON key.
  PineconeApiKeyParameterName:
    Type: String
    Default: /vertex-mcp-ops/pinecone-api-key
    Description: SecureString SSM parameter containing the Pinecone API key.
  OpenAIApiKeyParameterName:
    Type: String
    Default: /vertex-mcp-ops/openai-api-key
    Description: SecureString SSM parameter containing the OpenAI API key.

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codepipeline-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref CodeStarConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt DeployProject.Arn

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codebuild-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketVersioning
                Resource: !GetAtt ArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GcpServiceAccountKeyParameterName}"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${PineconeApiKeyParameterName}"
                  - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenAIApiKeyParameterName}"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"

  DeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${PipelineName}-deploy"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-aws-codepipeline.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: GCP_SERVICE_ACCOUNT_KEY_JSON
            Type: PARAMETER_STORE
            Value: !Ref GcpServiceAccountKeyParameterName
          - Name: PINECONE_API_KEY
            Type: PARAMETER_STORE
            Value: !Ref PineconeApiKeyParameterName
          - Name: OPENAI_API_KEY
            Type: PARAMETER_STORE
            Value: !Ref OpenAIApiKeyParameterName
          - Name: GCP_PROJECT_ID
            Value: !Ref GcpProjectId
          - Name: GCP_REGION
            Value: !Ref GcpRegion
          - Name: ARTIFACT_REPOSITORY
            Value: !Ref ArtifactRegistryRepository
          - Name: IMAGE_NAME
            Value: !Ref ImageName
          - Name: VERTEX_ENDPOINT_NAME
            Value: !Ref VertexEndpointName
          - Name: VERTEX_MODEL_NAME
            Value: !Ref VertexModelName
          - Name: PINECONE_HOST
            Value: !Ref PineconeHost
          - Name: PINECONE_INDEX
            Value: !Ref PineconeIndex
          - Name: PINECONE_NAMESPACE
            Value: !Ref PineconeNamespace
          - Name: MEMORY_NAMESPACE
            Value: !Ref MemoryNamespace
          - Name: OPENAI_EMBEDDING_MODEL
            Value: !Ref OpenAIEmbeddingModel
          - Name: OPENAI_EMBEDDING_DIMENSIONS
            Value: !Ref OpenAIEmbeddingDimensions
          - Name: OPENAI_GENERATION_MODEL
            Value: !Ref OpenAIGenerationModel

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Ref PipelineName
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref CodeStarConnectionArn
                FullRepositoryId: !Ref GitHubFullRepositoryId
                BranchName: !Ref GitHubBranch
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: TestBuildDeploy
          Actions:
            - Name: DeployToVertex
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref DeployProject
              InputArtifacts:
                - Name: SourceOutput
              RunOrder: 1

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  CodeBuildProjectName:
    Value: !Ref DeployProject
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
